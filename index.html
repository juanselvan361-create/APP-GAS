<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Eventos - Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Registro de Evento</h2>

<form id="formEvento">

  <label>Tramo:</label><br>
  <select id="tramo" required>
    <option value="">Seleccione un tramo</option>
  </select><br><br>

  <label>Tipo de Evento:</label><br>
  <select id="tipo_evento" required>
    <option value="">Seleccione tipo de evento</option>
  </select><br><br>

  <label>Latitud:</label><br>
  <input type="number" step="any" id="latitud" required><br><br>

  <label>Longitud:</label><br>
  <input type="number" step="any" id="longitud" required><br><br>

  <label>Comentario:</label><br>
  <textarea id="comentario"></textarea><br><br>

  <label>Foto:</label><br>
  <input type="file" id="foto" accept="image/*" required><br><br>

  <button type="button" id="btnGuardar">Guardar Evento</button>

</form>

<script>

  const SUPABASE_URL = "https://yecwroaomwrtndqtwjvl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_ccG_ne0F5dU_J7qZKSgOhw_r0DLhRXk";

  const { createClient } = supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

  // 🔹 Cargar listas
  async function cargarListas() {

    const selectTramo = document.getElementById("tramo");
    const selectTipo = document.getElementById("tipo_evento");

    selectTramo.innerHTML = '<option value="">Seleccione un tramo</option>';
    selectTipo.innerHTML = '<option value="">Seleccione tipo de evento</option>';

    const { data: tramos } =
      await supabaseClient.from("tramos").select("id,nombre");

    tramos.forEach(t => {
      selectTramo.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
    });

    const { data: tipos } =
      await supabaseClient.from("tipo_evento").select("id,nombre");

    tipos.forEach(t => {
      selectTipo.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
    });
  }

  // 🔹 Guardar evento
  document.getElementById("btnGuardar").addEventListener("click", async () => {

    const tramoId = document.getElementById("tramo").value;
    const tipoId = document.getElementById("tipo_evento").value;
    const lat = parseFloat(document.getElementById("latitud").value);
    const lng = parseFloat(document.getElementById("longitud").value);
    const comentario = document.getElementById("comentario").value;
    const fotoFile = document.getElementById("foto").files[0];

    if (!tramoId || !tipoId || !lat || !lng || !fotoFile) {
      alert("Completa todos los campos obligatorios");
      return;
    }

    const nombreArchivo = `${Date.now()}_${fotoFile.name}`;

    // Subir imagen
    const { error: uploadError } = await supabaseClient
      .storage
      .from("fotos-eventos")
      .upload(nombreArchivo, fotoFile);

    if (uploadError) {
      alert("Error al subir la foto: " + uploadError.message);
      return;
    }

    const { data: publicUrlData } = supabaseClient
      .storage
      .from("fotos-eventos")
      .getPublicUrl(nombreArchivo);

    const foto_url = publicUrlData.publicUrl;

    // Insertar evento
    const { error: insertError } = await supabaseClient
      .from("eventos")
      .insert([
        {
          tramo_id: tramoId,
          tipo_evento_id: tipoId,
          latitud: lat,
          longitud: lng,
          comentario,
          foto_url
        }
      ]);

    if (insertError) {
      alert("Error guardando evento: " + insertError.message);
    } else {
      alert("Evento guardado exitosamente 📌");
      document.getElementById("formEvento").reset();
    }

  });

  cargarListas();

</script>

</body>
</html>
