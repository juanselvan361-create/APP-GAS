<!DOCTYPE html>
<html>

<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a4fa3">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Eventos - Supabase</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f7;
padding:15px;
}

h2{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#0a4fa3;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

#btnGPS{
background:#1e8e3e;
margin-bottom:10px;
}

#btnInstalar{
background:#ff9800;
margin-top:10px;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>Registro de Evento</h2>

<form id="formEvento">

<label>Tramo</label>
<select id="tramo" required>
<option value="">Seleccione un tramo</option>
</select>

<label>Tipo de Evento</label>
<select id="tipo_evento" required>
<option value="">Seleccione tipo de evento</option>
</select>

<label>Latitud</label>
<input type="number" step="any" id="latitud" required>

<label>Longitud</label>
<input type="number" step="any" id="longitud" required>

<button type="button" id="btnGPS">📍 Obtener GPS</button>

<label>Comentario</label>
<textarea id="comentario"></textarea>

<label>Foto</label>
<input type="file" id="foto" accept="image/*" required>

<button type="button" id="btnGuardar">Guardar Evento</button>

<button type="button" id="btnInstalar">
📲 Instalar App
</button>

</form>

<script>

// SUPABASE
const SUPABASE_URL="https://yecwroaomwrtndqtwjvl.supabase.co"
const SUPABASE_KEY="sb_publishable_ccG_ne0F5dU_J7qZKSgOhw_r0DLhRXk"

const {createClient}=supabase
const supabaseClient=createClient(SUPABASE_URL,SUPABASE_KEY)


// CONVERTIR FOTO BASE64
function convertirFotoBase64(file){

return new Promise((resolve,reject)=>{

const reader=new FileReader()

reader.readAsDataURL(file)

reader.onload=()=>resolve(reader.result)

reader.onerror=error=>reject(error)

})

}


// GUARDAR EVENTO OFFLINE
function guardarOffline(evento){

let eventosOffline=JSON.parse(localStorage.getItem("eventosOffline")) || []

eventosOffline.push(evento)

localStorage.setItem("eventosOffline",JSON.stringify(eventosOffline))

alert("📴 Evento guardado sin internet")

}


// SINCRONIZAR EVENTOS
async function sincronizarEventos(){

let eventosOffline=JSON.parse(localStorage.getItem("eventosOffline"))

if(!eventosOffline) return

for(let evento of eventosOffline){

let foto_url=null

if(evento.foto_base64){

const blob=await fetch(evento.foto_base64).then(r=>r.blob())

const nombreArchivo=`${Date.now()}.jpg`

const {error}=await supabaseClient
.storage
.from("fotos-eventos")
.upload(nombreArchivo,blob)

if(!error){

const {data}=supabaseClient
.storage
.from("fotos-eventos")
.getPublicUrl(nombreArchivo)

foto_url=data.publicUrl

}

}

await supabaseClient
.from("eventos")
.insert([{

tramo_id:evento.tramo_id,
tipo_evento_id:evento.tipo_evento_id,
latitud:evento.latitud,
longitud:evento.longitud,
comentario:evento.comentario,
foto_url:foto_url

}])

}

localStorage.removeItem("eventosOffline")

alert("☁ Eventos sincronizados")

}


// CUANDO REGRESA INTERNET
window.addEventListener("online",()=>{

sincronizarEventos()

})


// GPS
document.getElementById("btnGPS").addEventListener("click",()=>{

navigator.geolocation.getCurrentPosition(pos=>{

document.getElementById("latitud").value=pos.coords.latitude
document.getElementById("longitud").value=pos.coords.longitude

})

})


// GUARDAR EVENTO
document.getElementById("btnGuardar").addEventListener("click",async()=>{

const tramo=document.getElementById("tramo").value
const tipo=document.getElementById("tipo_evento").value
const lat=document.getElementById("latitud").value
const lng=document.getElementById("longitud").value
const comentario=document.getElementById("comentario").value
const foto=document.getElementById("foto").files[0]

if(!tramo||!tipo||!lat||!lng||!foto){

alert("Completa todos los campos")

return

}


// SIN INTERNET
if(!navigator.onLine){

const fotoBase64=await convertirFotoBase64(foto)

guardarOffline({

tramo_id:tramo,
tipo_evento_id:tipo,
latitud:lat,
longitud:lng,
comentario,
foto_base64:fotoBase64

})

return

}


// CON INTERNET
const nombreArchivo=`${Date.now()}_${foto.name}`

const {error}=await supabaseClient
.storage
.from("fotos-eventos")
.upload(nombreArchivo,foto)

if(error){

alert("Error subiendo foto")

return

}

const {data}=supabaseClient
.storage
.from("fotos-eventos")
.getPublicUrl(nombreArchivo)

await supabaseClient
.from("eventos")
.insert([{

tramo_id:tramo,
tipo_evento_id:tipo,
latitud:lat,
longitud:lng,
comentario,
foto_url:data.publicUrl

}])

alert("Evento guardado 📍")

document.getElementById("formEvento").reset()

})


// CARGAR LISTAS
async function cargarListas(){

const {data:tramos}=await supabaseClient.from("tramos").select("id,nombre")
const {data:tipos}=await supabaseClient.from("tipo_evento").select("id,nombre")

tramos.forEach(t=>{

document.getElementById("tramo").innerHTML+=`<option value="${t.id}">${t.nombre}</option>`

})

tipos.forEach(t=>{

document.getElementById("tipo_evento").innerHTML+=`<option value="${t.id}">${t.nombre}</option>`

})

}

cargarListas()


// SERVICE WORKER
if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js")

}


// BOTON INSTALAR
let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("btnInstalar").style.display="block"

})

document.getElementById("btnInstalar").addEventListener("click",async()=>{

if(!deferredPrompt){

alert("Instalación no disponible")

return

}

deferredPrompt.prompt()

await deferredPrompt.userChoice

deferredPrompt=null

})

</script>

</body>
</html>
