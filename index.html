<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Registro de Eventos - Supabase</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

<h2>Registro de Evento</h2>

<form id="formEvento">

  <label for="tramo">Tramo:</label><br>
  <select id="tramo" required></select><br><br>

  <label for="tipo_evento">Tipo de Evento:</label><br>
  <select id="tipo_evento" required></select><br><br>

  <label for="latitud">Latitud:</label><br>
  <input type="text" id="latitud" required><br><br>

  <label for="longitud">Longitud:</label><br>
  <input type="text" id="longitud" required><br><br>

  <label for="comentario">Comentario:</label><br>
  <textarea id="comentario"></textarea><br><br>

  <label for="foto">Foto:</label><br>
  <input type="file" id="foto" accept="image/*" required><br><br>

  <button type="submit">Guardar Evento</button>

</form>
<script>
  console.log("Script cargado");
</script>
<script>
  // 🔹 Tus credenciales reales
  const SUPABASE_URL = "https://yecwroaomwrtndqtwjvl.supabase.co";
  const SUPABASE_KEY = "sb_publishable_ccG_ne0F5dU_J7qZKSgOhw_r0DLhRXk";

  const { createClient } = supabase;
  const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY);

  // 🔹 Cargar listas dinámicamente
  async function cargarListas() {

    const { data: tramos, error: errorTramos } =
      await supabaseClient.from("tramos").select("id,nombre");

    if (errorTramos) {
      console.error(errorTramos);
      alert("Error cargando tramos");
      return;
    }

    const selectTramo = document.getElementById("tramo");
    tramos.forEach(t => {
      selectTramo.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
    });

    const { data: tipos, error: errorTipos } =
      await supabaseClient.from("tipo_evento").select("id,nombre");

    if (errorTipos) {
      console.error(errorTipos);
      alert("Error cargando tipos de evento");
      return;
    }

    const selectTipo = document.getElementById("tipo_evento");
    tipos.forEach(t => {
      selectTipo.innerHTML += `<option value="${t.id}">${t.nombre}</option>`;
    });
  }

  // 🔹 Guardar evento
  document.getElementById("formEvento").addEventListener("submit", async (e) => {
    e.preventDefault();

    const tramoId = document.getElementById("tramo").value;
    const tipoId = document.getElementById("tipo_evento").value;
    const lat = parseFloat(document.getElementById("latitud").value);
    const lng = parseFloat(document.getElementById("longitud").value);
    const comentario = document.getElementById("comentario").value;
    const fotoFile = document.getElementById("foto").files[0];

    if (!fotoFile) {
      alert("Selecciona una imagen");
      return;
    }

    const nombreArchivo = `${Date.now()}_${fotoFile.name}`;

    // 📸 Subir imagen
    const { error: uploadError } = await supabaseClient
      .storage
      .from("fotos-eventos")
      .upload(nombreArchivo, fotoFile);

    if (uploadError) {
      alert("Error al subir la foto: " + uploadError.message);
      return;
    }

    // 🔗 Obtener URL pública
    const { data: publicUrlData } = supabaseClient
      .storage
      .from("fotos-eventos")
      .getPublicUrl(nombreArchivo);

    const foto_url = publicUrlData.publicUrl;

    // 🗄 Guardar registro
    const { error: insertError } = await supabaseClient
      .from("eventos")
      .insert([
        {
          tramo_id: tramoId,
          tipo_evento_id: tipoId,
          latitud: lat,
          longitud: lng,
          comentario,
          foto_url
        }
      ]);

    if (insertError) {
      alert("Error guardando evento: " + insertError.message);
    } else {
      alert("Evento guardado exitosamente 📌");
      document.getElementById("formEvento").reset();
    }

  });

  cargarListas();
</script>

</body>
</html>
