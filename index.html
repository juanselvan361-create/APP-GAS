<!DOCTYPE html>
<html>

<head>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a4fa3">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Registro de Eventos - Supabase</title>

<style>

body{
font-family: Arial, sans-serif;
background:#f2f4f7;
padding:15px;
}

h2{
text-align:center;
}

form{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

label{
font-weight:bold;
margin-top:10px;
display:block;
}

input, select, textarea{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:14px;
font-size:18px;
background:#0a4fa3;
color:white;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#083a7a;
}

#btnGPS{
background:#1e8e3e;
margin-bottom:10px;
}

#btnGPS:hover{
background:#166b2d;
}

#btnInstalar{
background:#ff9800;
margin-top:10px;
display:none;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body>

<h2>Registro de Evento</h2>

<form id="formEvento">

<label>Tramo</label>
<select id="tramo" required>
<option value="">Seleccione un tramo</option>
</select>

<label>Tipo de Evento</label>
<select id="tipo_evento" required>
<option value="">Seleccione tipo de evento</option>
</select>

<label>Latitud</label>
<input type="number" step="any" id="latitud" required>

<label>Longitud</label>
<input type="number" step="any" id="longitud" required>

<button type="button" id="btnGPS">📍 Obtener GPS</button>

<label>Comentario</label>
<textarea id="comentario"></textarea>

<label>Foto</label>
<input type="file" id="foto" accept="image/*" required>

<button type="button" id="btnGuardar">Guardar Evento</button>

<button type="button" id="btnInstalar">
📲 Instalar App
</button>

</form>

<script>

// SUPABASE
const SUPABASE_URL="https://yecwroaomwrtndqtwjvl.supabase.co"
const SUPABASE_KEY="sb_publishable_ccG_ne0F5dU_J7qZKSgOhw_r0DLhRXk"

const {createClient}=supabase
const supabaseClient=createClient(SUPABASE_URL,SUPABASE_KEY)


// GPS
document.getElementById("btnGPS").addEventListener("click",()=>{

if(!navigator.geolocation){
alert("GPS no soportado")
return
}

navigator.geolocation.getCurrentPosition(pos=>{

document.getElementById("latitud").value=pos.coords.latitude
document.getElementById("longitud").value=pos.coords.longitude

},err=>{
alert("No se pudo obtener la ubicación")
})

})


// GUARDAR OFFLINE
document.getElementById("btnGuardar").addEventListener("click",async()=>{

const tramoId=document.getElementById("tramo").value
const tipoId=document.getElementById("tipo_evento").value
const lat=parseFloat(document.getElementById("latitud").value)
const lng=parseFloat(document.getElementById("longitud").value)
const comentario=document.getElementById("comentario").value
const fotoFile=document.getElementById("foto").files[0]

if(!tramoId||!tipoId||!lat||!lng||!fotoFile){
alert("Completa todos los campos")
return
}

document.getElementById("btnGuardar").innerText="Guardando..."

let fotoBase64=null

// SI NO HAY INTERNET
if(!navigator.onLine){

fotoBase64=await convertirFotoBase64(fotoFile)

const evento={

tramo_id:tramoId,
tipo_evento_id:tipoId,
latitud:lat,
longitud:lng,
comentario,
foto_base64:fotoBase64

}

guardarOffline(evento)

document.getElementById("btnGuardar").innerText="Guardar Evento"

return

}{

let eventosOffline = JSON.parse(localStorage.getItem("eventosOffline")) || []

eventosOffline.push(evento)

localStorage.setItem("eventosOffline",JSON.stringify(eventosOffline))

alert("📴 Evento guardado sin internet")

}


// SINCRONIZAR
async function sincronizarEventos(){

let eventosOffline = JSON.parse(localStorage.getItem("eventosOffline"))

if(!eventosOffline || eventosOffline.length===0){
return
}

for(let evento of eventosOffline){

let foto_url=null

// SUBIR FOTO
if(evento.foto_base64){

const blob=await fetch(evento.foto_base64).then(r=>r.blob())

const nombreArchivo=`${Date.now()}.jpg`

const {error}=await supabaseClient
.storage
.from("fotos-eventos")
.upload(nombreArchivo,blob)

if(!error){

const {data}=supabaseClient
.storage
.from("fotos-eventos")
.getPublicUrl(nombreArchivo)

foto_url=data.publicUrl

}

}

await supabaseClient
.from("eventos")
.insert([{

tramo_id:evento.tramo_id,
tipo_evento_id:evento.tipo_evento_id,
latitud:evento.latitud,
longitud:evento.longitud,
comentario:evento.comentario,
foto_url:foto_url

}])

}

localStorage.removeItem("eventosOffline")

alert("☁ Eventos sincronizados")

}

// DETECTAR INTERNET
window.addEventListener("online",()=>{

sincronizarEventos()

})


// CARGAR LISTAS
async function cargarListas(){

const selectTramo=document.getElementById("tramo")
const selectTipo=document.getElementById("tipo_evento")

const {data:tramos}=await supabaseClient
.from("tramos")
.select("id,nombre")

tramos.forEach(t=>{
selectTramo.innerHTML+=`<option value="${t.id}">${t.nombre}</option>`
})

const {data:tipos}=await supabaseClient
.from("tipo_evento")
.select("id,nombre")

tipos.forEach(t=>{
selectTipo.innerHTML+=`<option value="${t.id}">${t.nombre}</option>`
})

}


// GUARDAR EVENTO
document.getElementById("btnGuardar").addEventListener("click",async()=>{

const tramoId=document.getElementById("tramo").value
const tipoId=document.getElementById("tipo_evento").value
const lat=parseFloat(document.getElementById("latitud").value)
const lng=parseFloat(document.getElementById("longitud").value)
const comentario=document.getElementById("comentario").value
const fotoFile=document.getElementById("foto").files[0]

if(!tramoId||!tipoId||!lat||!lng||!fotoFile){
alert("Completa todos los campos")
return
}

document.getElementById("btnGuardar").innerText="Guardando..."

const nombreArchivo=`${Date.now()}_${fotoFile.name}`


// SUBIR FOTO
const {error:uploadError}=await supabaseClient
.storage
.from("fotos-eventos")
.upload(nombreArchivo,fotoFile)

if(uploadError){
alert("Error al subir foto")
document.getElementById("btnGuardar").innerText="Guardar Evento"
return
}

const {data:publicUrlData}=supabaseClient
.storage
.from("fotos-eventos")
.getPublicUrl(nombreArchivo)

const foto_url=publicUrlData.publicUrl

const evento={

tramo_id:tramoId,
tipo_evento_id:tipoId,
latitud:lat,
longitud:lng,
comentario,
foto_url

}


// SIN INTERNET
if(!navigator.onLine){

guardarOffline(evento)

document.getElementById("btnGuardar").innerText="Guardar Evento"

return

}


// INSERTAR
const {error:insertError}=await supabaseClient
.from("eventos")
.insert([evento])


if(insertError){

guardarOffline(evento)

}else{

alert("Evento guardado correctamente 📍")

document.getElementById("formEvento").reset()

}

document.getElementById("btnGuardar").innerText="Guardar Evento"

})


// CARGAR LISTAS
cargarListas()


// SERVICE WORKER
if ("serviceWorker" in navigator) {

window.addEventListener("load", () => {

navigator.serviceWorker.register("./service-worker.js")
.then(reg => console.log("Service Worker registrado"))
.catch(err => console.log("Error registrando SW:", err))

})

}


// BOTON INSTALAR APP
let deferredPrompt

window.addEventListener("beforeinstallprompt",(e)=>{

e.preventDefault()

deferredPrompt=e

document.getElementById("btnInstalar").style.display="block"

})


document.getElementById("btnInstalar").addEventListener("click",async()=>{

if(!deferredPrompt){

alert("La app aún no está lista para instalar")

return

}

deferredPrompt.prompt()

const {outcome}=await deferredPrompt.userChoice

if(outcome==="accepted"){

console.log("App instalada")

}

deferredPrompt=null

})

</script>

</body>
</html>
